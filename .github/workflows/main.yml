name: Atualizar Radar Mineral

on:
  schedule:
    - cron: '0 */3 * * *' # Roda a cada 3 horas
  workflow_dispatch:      # Botão para rodar agora

# Impede que o GitHub tente publicar duas vezes ao mesmo tempo (evita o erro 403/429 de conflito)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25 # Dá tempo para o robô processar com as pausas
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: pip install pandas requests beautifulsoup4 google-generativeai

      - name: Rodar o Robô de Notícias
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python robo_geologico.py

      - name: Salvar e Publicar Mudanças
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          # O commit só acontece se houver mudanças reais, evitando erros de "nada para salvar"
          git commit -m "Série Histórica Atualizada: $(date)" || exit 0
          git push
