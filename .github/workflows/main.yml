name: Atualizar Radar Mineral

on:
  schedule:
    - cron: '0 */3 * * *' # Roda a cada 3 horas (00:00, 03:00, 06:00...)
  workflow_dispatch: # Permite rodar manualmente agora mesmo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: pip install pandas requests beautifulsoup4 google-generativeai

      - name: Rodar o Robô de Notícias
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python robo_geologico.py

      - name: Salvar e Publicar Mudanças
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add .
          git commit -m "Atualização automática (Série Histórica): $(date)" || exit 0
          git push
